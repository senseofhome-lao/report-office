<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ລະບົບຕິດຕາມການເຄື່ອນໄຫວຕ່າງແຂວງ - LDB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Lao', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2d6a4f 100%); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full shadow-lg mb-4">
        <svg class="w-12 h-12 text-blue-800" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">LDB BANK</h1>
      <p class="text-blue-200 mt-1">ລະບົບຕິດຕາມການເຄື່ອນໄຫວຕ່າງແຂວງ</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-gray-800 mb-6 text-center">ເຂົ້າສູ່ລະບົບ</h2>

      <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ຊື່ຜູ້ໃຊ້</label>
          <input type="text" id="username" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="ປ້ອນຊື່ຜູ້ໃຊ້">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">ລະຫັດຜ່ານ</label>
          <div class="relative">
            <input type="password" id="password" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
              placeholder="ປ້ອນລະຫັດຜ່ານ">
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn"
          class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2">
          <span>ເຂົ້າສູ່ລະບົບ</span>
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-100">
        <p class="text-xs text-gray-400 text-center">ລະບົບຕິດຕາມການເຄື່ອນໄຫວຕ່າງແຂວງ &copy; 2026 LDB Bank</p>
      </div>
    </div>
  </div>

  <script>
    function togglePwd() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span>ກຳລັງເຂົ້າລະບົບ...</span>';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();
        if (res.ok) {
          window.location.href = data.role === 'admin' ? '/admin' : '/user';
        } else {
          err.textContent = data.error;
          err.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<span>ເຂົ້າສູ່ລະບົບ</span>';
        }
      } catch {
        err.textContent = 'ເກີດຂໍ້ຜິດພາດ ກາລຸນາລອງໃໝ່';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>ເຂົ້າສູ່ລະບົບ</span>';
      }
    });
  </script>
</body>
</html>
